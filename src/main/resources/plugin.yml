name: AutoReplant
version: ${project.version}
main: dev.autoreplant.AutoReplantPlugin
api-version: '1.21'
description: Automatically replants crops when harvested at full maturity
authors:
  - MrPippi

softdepend:
  - PlaceholderAPI
  - AutoPickup

commands:
  autoreplant:
    description: Toggle auto-replant feature on or off
    usage: /<command> <on|off|reload>
    aliases:
      - arp
    permission: autoreplant.use

permissions:
  autoreplant.use:
    description: Allows player to toggle auto-replant
    default: true
  autoreplant.reload:
    description: Allows reloading the AutoReplant configuration
    default: op
